<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Gmail Collector</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-effects">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="nav-brand">
            <span class="brand-icon">📧</span>
            <span class="brand-text">Gmail Collector</span>
        </a>
    </nav>

    <main class="container">
        <div class="form-container">
            <div class="form-card">
                <h2 class="form-title">🔐 Login Admin</h2>
                <p class="form-subtitle">Masukkan password untuk akses dashboard</p>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Masukkan password">
                    <span class="error" id="error-msg" style="display:none;color:#ef4444;margin-top:8px;"></span>
                </div>
                <button id="login-btn" class="submit-btn">Login 🚀</button>

                <a href="index.html" class="back-link">← Kembali ke Beranda</a>
            </div>
        </div>
    </main>

    <script>
        if (localStorage.getItem('admin_token')) {
            window.location.href = 'admin.html';
        }

        document.getElementById('login-btn').addEventListener('click', async function() {
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');
            const btn = this;
            
            if (!password) {
                errorMsg.textContent = 'Masukkan password!';
                errorMsg.style.display = 'block';
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'Checking...';
            errorMsg.style.display = 'none';
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: password })
                });
                const result = await response.json();
                
                if (result.success) {
                    localStorage.setItem('admin_token', result.token);
                    setTimeout(function() {
                        window.location.href = 'admin.html';
                    }, 100);
                } else {
                    errorMsg.textContent = 'Password salah!';
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Login 🚀';
                }
            } catch (error) {
                errorMsg.textContent = 'Gagal login. Coba lagi.';
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Login 🚀';
            }
        });

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('login-btn').click();
            }
        });
    </script>
</body>
</html>
